version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: deciops-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deciops-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4Gi
        reservations:
          cpus: '1'
          memory: 2Gi

  redis:
    image: redis:7-alpine
    container_name: deciops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deciops-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1Gi

  decision-engine:
    image: deciops/decision-engine:${IMAGE_TAG:-latest}
    container_name: deciops-decision-engine
    environment:
      DATA_PLATFORM_URL: ${DATA_PLATFORM_URL}
      AGENT_PLATFORM_URL: ${AGENT_PLATFORM_URL}
      DB_URL: postgresql://deciops:${DB_PASSWORD}@postgres:5432/deciops
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - decision_engine_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - deciops-network
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 2Gi
        reservations:
          cpus: '1'
          memory: 1Gi
    restart: unless-stopped

  backend-bff:
    image: deciops/backend-bff:${IMAGE_TAG:-latest}
    container_name: deciops-backend-bff
    environment:
      DATABASE_URL: postgresql://deciops:${DB_PASSWORD}@postgres:5432/deciops
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENGINE_URL: http://decision-engine:8080
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      decision-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - deciops-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1Gi
        reservations:
          cpus: '500m'
          memory: 512Mi
    restart: unless-stopped

  web:
    image: deciops/web:${IMAGE_TAG:-latest}
    container_name: deciops-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    ports:
      - "80:3000"
    depends_on:
      backend-bff:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - deciops-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512Mi
        reservations:
          cpus: '250m'
          memory: 256Mi
    restart: unless-stopped

networks:
  deciops-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  decision_engine_data:
