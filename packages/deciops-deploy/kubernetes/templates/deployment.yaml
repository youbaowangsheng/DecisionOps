apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "deciops.fullname" . }}-decision-engine
  labels:
    {{- include "deciops.labels" . | nindent 4 }}
    app: decision-engine
spec:
  replicas: {{ .Values.decisionEngine.replicaCount }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "deciops.selectorLabels" . | nindent 6 }}
      app: decision-engine
  template:
    metadata:
      labels:
        {{- include "deciops.selectorLabels" . | nindent 8 }}
        app: decision-engine
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: decision-engine
          image: "{{ .Values.image.repository }}/decision-engine:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.decisionEngine.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "deciops.fullname" . }}-engine-config
            - configMapRef:
                name: {{ include "deciops.fullname" . }}-external-db-config
            - configMapRef:
                name: {{ include "deciops.fullname" . }}-external-redis-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "deciops.externalDbSecret" . }}
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "deciops.fullname" . }}-secrets
                  key: REDIS_PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.decisionEngine.resources | nindent 12 }}
          volumeMounts:
            - name: app-data
              mountPath: /app/data
      volumes:
        - name: app-data
          emptyDir: {}

