{{- if .Values.observability.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "deciops.fullname" . }}-promtail
  labels:
    {{- include "deciops.labels" . | nindent 4 }}
    app: promtail
spec:
  selector:
    matchLabels:
      {{- include "deciops.selectorLabels" . | nindent 6 }}
      app: promtail
  template:
    metadata:
      labels:
        {{- include "deciops.selectorLabels" . | nindent 8 }}
        app: promtail
    spec:
      serviceAccountName: {{ include "deciops.fullname" . }}-promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.0
          args:
            - -config.file=/etc/promtail/promtail.yaml
            - -client.url=http://{{ include "deciops.fullname" . }}-loki:3100/loki/api/v1/push
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: http
              containerPort: 3101
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
            - name: dockerlogs
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsUser: 0
      volumes:
        - name: config
          configMap:
            name: {{ include "deciops.fullname" . }}-promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: dockerlogs
          hostPath:
            path: /var/lib/docker/containers

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "deciops.fullname" . }}-promtail-config
  labels:
    {{- include "deciops.labels" . | nindent 4 }}
data:
  promtail.yaml: |
    server:
      http_listen_port: 3101
      grpc_listen_port: 9096
    clients:
      - url: http://{{ include "deciops.fullname" . }}-loki:3100/loki/api/v1/push
    positions:
      filename: /var/positions.yaml
    target_config:
      scrape_interval: 15s
      wash_period: 100ms
    scrape_configs:
      - job_name: deciops
        static_configs:
          - targets:
              - localhost
            labels:
              job: deciops
              __path__: /var/log/deciops/*.log
        pipeline_stages:
          - json:
              expressions:
                timestamp: timestamp
                level: level
                message: message
                service: service
          - labels:
              level: ""
              service: ""
      - job_name: containers
        static_configs:
          - targets:
              - localhost
            labels:
              job: container
              __path__: /var/lib/docker/containers/*/*.log
        pipeline_stages:
          - json:
              expressions:
                log: log
                stream: stream
          - json:
              expressions:
                timestamp: timestamp
                message: message
              source: log
          - regex:
              expression: '^.*(?P<timestamp>[\d]+.[\d]+).*(?P<level>[IWED]).*$'
              source: message
          - labels:
              stream: ""
{{- end }}