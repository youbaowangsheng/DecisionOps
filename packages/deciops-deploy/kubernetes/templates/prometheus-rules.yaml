{{- if .Values.observability.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "deciops.fullname" . }}-recording-rules
  labels:
    {{- include "deciops.labels" . | nindent 4 }}
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: deciops.recording_rules
      rules:
        - record: deciops:backend_request_total:rate5m
          expr: sum(rate(http_requests_total{service="backend-bff"}[5m]))

        - record: deciops:backend_request_duration_seconds_bucket:percentile95
          expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{service="backend-bff"}[5m])) by (le))

        - record: deciops:backend_request_duration_seconds_bucket:percentile99
          expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{service="backend-bff"}[5m])) by (le))

        - record: deciops:engine_request_total:rate5m
          expr: sum(rate(http_requests_total{service="decision-engine"}[5m]))

        - record: deciops:engine_request_duration_seconds_bucket:percentile95
          expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{service="decision-engine"}[5m])) by (le))

        - record: deciops:engine_request_duration_seconds_bucket:percentile99
          expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{service="decision-engine"}[5m])) by (le))

        - record: deciops:decision_total:rate5m
          expr: sum(rate(decisions_total[5m]))

        - record: deciops:error_total:rate5m
          expr: sum(rate(http_requests_total{service=~"backend-bff|decision-engine",status=~"5.."}[5m]))

        - record: deciops:error_rate_5m
          expr: |
            sum(rate(http_requests_total{status=~"5..",service=~"backend-bff|decision-engine"}[5m]))
            /
            sum(rate(http_requests_total{service=~"backend-bff|decision-engine"}[5m]))

---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "deciops.fullname" . }}-alerting-rules
  labels:
    {{- include "deciops.labels" . | nindent 4 }}
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: deciops.alerting_rules
      rules:
        - alert: DeciOpsHighErrorRate
          expr: deciops:error_rate_5m > 0.01
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ $value | humanizePercentage }} (threshold: 1%)"

        - alert: DeciOpsHighLatency
          expr: deciops:backend_request_duration_seconds_bucket:percentile95 > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High latency detected"
            description: "p95 latency is {{ $value | humanizeDuration }} (threshold: 500ms)"

        - alert: DeciOpsBackendDown
          expr: up{service="backend-bff"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Backend BFF is down"
            description: "Backend BFF has been down for more than 1 minute"

        - alert: DeciOpsEngineDown
          expr: up{service="decision-engine"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Decision Engine is down"
            description: "Decision Engine has been down for more than 1 minute"

        - alert: DeciOpsDecisionBacklogGrowing
          expr: |
            (sum(decisions_pending) / sum(decisions_total)) > 0.5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Decision backlog growing"
            description: "Decision backlog ratio is {{ $value | humanizePercentage }}"

        - alert: DeciOpsHighMemoryUsage
          expr: |
            (sum(container_memory_working_set_bytes{pod=~"deciops-.*"}) by (pod)
            /
            (sum(container_spec_memory_limit_bytes{pod=~"deciops-.*"}) by (pod)) > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage detected"
            description: "Memory usage is {{ $value | humanizePercentage }} of limit"

        - alert: DeciOpsHighCPUUsage
          expr: |
            (sum(rate(container_cpu_usage_seconds_total{pod=~"deciops-.*"}[5m])) by (pod)
            /
            sum(container_spec_cpu_quota{pod=~"deciops-.*"}/100000) by (pod)) > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage detected"
            description: "CPU usage is {{ $value | humanizePercentage }} of quota"
{{- end }}